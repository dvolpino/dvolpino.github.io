<body>
<header class="head"><a href="Home.html"><img src="logo.png" alt="" width="675" height="127" ></a></header>
<footer class="cuerpo">
  <nav>
	<div class="navigation">
	  		
		<!-- Place this menu only on your settings/selector page -->
<div class="selector-panel" class="SubGenre">
    <p class="SubGenre">Choose Background</p>
    <select id="bgSelector" onchange="updateBackground()">
        <option value="background YTML.jpg">Panal</option>
        <option value="background2.jpg">Bronza</option>
        
    </select>
</div>

<script>
    function updateBackground() {
        const selector = document.getElementById('bgSelector');
        const selectedImage = selector.value;
        
        // 1. Apply it to the current page instantly
        document.body.style.backgroundImage = "url('" + selectedImage + "')";
        
        // 2. Save the choice to the browser's memory
        localStorage.setItem('userBackground', selectedImage);
    }

    // Keep the dropdown menu showing the correct option on page load
    window.addEventListener('DOMContentLoaded', () => {
        const savedBg = localStorage.getItem('userBackground');
        if (savedBg) {
            document.getElementById('bgSelector').value = savedBg;
            document.body.style.backgroundImage = "url('" + savedBg + "')";
        }
    </script>

			  </div>
		</nav>
  </footer>
	<script src="background-manager.js"></script>
</body>
