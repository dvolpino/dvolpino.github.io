<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>YTML</title>
<style type="text/css">

  /* Shuffle button starts dimmed (off); ytToggleShuffle() sets opacity to 1 when on */
  #yt-shuffle { opacity: 0.35; } 
	
	 /* Fix background-attachment: fixed breaking on mobile 
  @media (max-width: 768px) {
    body {
      background-attachment: scroll;
    }
  } */
</style>

<link href="playerstyles.css" rel="stylesheet" type="text/css">
<link href="styles.css" rel="stylesheet" type="text/css">	
<link rel="icon" href="favicon.ico" type="image/x-icon">
<link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
</head>
<!--
  HOW TO LINK TO THE PLAYER FROM ANY PAGE
  =========================================

  YOUTUBE MODE:
    MPlayer.html?list=PLAYLIST_ID&name=Playlist+Name&color=COLOR&labelcolor=COLOR

  NAS MODE:
    MPlayer.html?source=nas&playlist=URL_TO_PLAYLIST_JSON&name=Playlist+Name

  NAS JSON FORMAT (save as a .json file on your NAS and link to it):
  {
    "name": "Album Name",
    "tracks": [
      { "title": "Song Title", "artist": "Artist Name",
        "src": "http://NAS_IP/music/Artist/Album/01 - Song.mp3",
        "folder": "http://NAS_IP/music/Artist/Album/" },
      ...
    ]
  }
  The "folder" field is used to load folder.jpg as album art.

  AVAILABLE PARAMETERS (YouTube mode):
  list        (required) YouTube playlist ID
  name        (optional) Playlist label
  color       (optional) Accent color (hex as %23rrggbb, or named)
  labelcolor  (optional) Header label color
  thumb       (optional) Cover image path

-->
<body>
<header class="head"><a><img src="images/logo.webp" alt="" width="675" height="127" onclick="history.back()" /></a></header>
<footer class="cuerpo">
  <nav>
  	
  <div class="yt-player-wrap">

  <div class="yt-video-wrapper">
    <!-- YouTube player container -->
    <div id="yt-player">
      <div class="yt-empty" id="yt-empty">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <polygon points="5 3 19 12 5 21 5 3"/>
        </svg>
        <span>No playlist selected</span>
      </div>
    </div>
    <div id="yt-cover-wrap" style="display:none; position:absolute; inset:0; cursor:pointer; z-index:10;" onclick="ytStartFromCover()">
      <img id="yt-cover-img" src="" alt="" style="width:100%; height:100%; object-fit:cover; display:block;"/>
      <div style="position:absolute; inset:0; display:flex; align-items:center; justify-content:center; background:rgba(0,0,0,0.25);">
        <svg width="72" height="72" viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="36" cy="36" r="36" fill="rgba(0,0,0,0.5)"/>
          <polygon points="28,20 56,36 28,52" fill="white"/>
        </svg>
      </div>
    </div>

    <!-- NAS mode: album art display + hidden audio element. Hidden in YouTube mode. -->
    <div id="nas-player" style="display:none; width:100%; background:#111; position:relative;">
      <img id="nas-album-art" src="" alt="Album Art"
           style="width:100%; aspect-ratio:1/1; object-fit:cover; display:block;"/>
      <audio id="nas-audio" preload="auto"></audio>
    </div>
  </div>

  <div class="yt-controls">
    <!-- Shuffle toggle: SVG icon, transparent background, dims when off -->
    <button id="yt-shuffle" onclick="ytToggleShuffle()" title="Shuffle">
      <svg width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="16 3 21 3 21 8"/>
        <line x1="4" y1="20" x2="21" y2="3"/>
        <polyline points="21 16 21 21 16 21"/>
        <line x1="15" y1="15" x2="21" y2="21"/>
      </svg>
    </button>

    <!-- NAS mode prev/playpause/next — hidden in YouTube mode -->
    <button id="nas-prev" onclick="nasPrev()" title="Previous" style="display:none;">
      <svg width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="19" x2="5" y2="5"/>
      </svg>
    </button>
    <button id="nas-playpause" onclick="nasPlayPause()" title="Play / Pause" style="display:none;">
      <svg id="nas-pp-icon" width="1em" height="1em" viewBox="0 0 24 24" fill="currentColor" stroke="none">
        <polygon points="5 3 19 12 5 21 5 3"/>
      </svg>
    </button>
    <button id="nas-next" onclick="nasNext()" title="Next" style="display:none;">
      <svg width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19"/>
      </svg>
    </button>

    <div class="yt-track-info">
      <span id="yt-track-title"></span>
    </div>
    <span id="yt-time-display"></span>
  </div>

  <div class="yt-playlist">
    <div class="yt-playlist-header">
      <span id="yt-playlist-name">Playlist</span>
      <span id="yt-playlist-count"></span>
    </div>
    <div class="yt-playlist-list" id="yt-playlist-list">
      <div class="yt-playlist-loading" id="yt-playlist-loading">Select a playlist to begin.</div>
    </div>
  </div>
  </div>
  </nav>

<script src="background-manager.js"></script>

<script>
  /* ═══════════════════════════════════════════════════════
     URL PARAMETERS
     ═══════════════════════════════════════════════════════ */
  var params      = new URLSearchParams(window.location.search);
  var NAS_MODE    = params.get('source') === 'nas';   /* true = NAS mode, false = YouTube mode */
  var YT_LIST_ID  = params.get('list')   || '';
  var YT_NAME     = params.get('name')   || 'Playlist';
  var YT_COLOR    = params.get('color')  || '';
  var YT_LBLCOLOR = params.get('labelcolor') || '';
  var YT_THUMB    = params.get('thumb')  || '';
  var NAS_PLAYLIST_URL = params.get('playlist') || '';  /* URL to NAS JSON or M3U playlist file */
  var NAS_BASE_URL     = params.get('base')     || '';  /* Base folder URL for resolving relative M3U paths */

  /* Set playlist header name */
  if (YT_NAME) document.getElementById('yt-playlist-name').textContent = decodeURIComponent(YT_NAME);

  /* Apply accent color (YouTube mode) */
  if (YT_COLOR) {
    var styleEl = document.createElement('style');
    styleEl.textContent = [
      '.yt-track-row.active::before { background: ' + YT_COLOR + ' !important; }',
      '.yt-track-row.active .yt-track-num { color: ' + YT_COLOR + ' !important; }',
      '.yt-track-row.active .yt-track-name { color: ' + YT_COLOR + ' !important; }',
      '.yt-track-row.active { background: color-mix(in srgb, ' + YT_COLOR + ' 8%, transparent) !important; }'
    ].join('\n');
    document.head.appendChild(styleEl);
  }

  /* Apply label color */
  if (YT_LBLCOLOR) {
    var lblEl = document.createElement('style');
    lblEl.textContent = '#yt-playlist-name { color: ' + YT_LBLCOLOR + ' !important; }';
    document.head.appendChild(lblEl);
  }

  /* ═══════════════════════════════════════════════════════
     SHARED STATE
     ═══════════════════════════════════════════════════════ */
  var ytTracks      = [];   /* track list used by both modes */
  var ytCurrentIndex = 0;
  var ytShuffleOn   = false;
  var ytTimerInterval = null;

  /* ═══════════════════════════════════════════════════════
     SHUFFLE TOGGLE (shared between both modes)
     ═══════════════════════════════════════════════════════ */
  /* Toggles shuffle on/off. In YouTube mode calls the IFrame API.
     In NAS mode shuffling is handled manually via nasShuffleOrder. */
  function ytToggleShuffle() {
    ytShuffleOn = !ytShuffleOn;
    /* YouTube mode: delegate to the IFrame API */
    if (!NAS_MODE && typeof ytPlayer !== 'undefined' && ytPlayer) {
      ytPlayer.setShuffle(ytShuffleOn);
    }
    /* NAS mode: rebuild the shuffle order */
    if (NAS_MODE) nasApplyShuffle();
    var btn = document.getElementById('yt-shuffle');
    btn.style.opacity = ytShuffleOn ? '1' : '0.35';
    btn.style.filter  = ytShuffleOn ? 'brightness(2)' : 'brightness(1)';
    btn.title = ytShuffleOn ? 'Shuffle: On' : 'Shuffle: Off';
  }

  /* ═══════════════════════════════════════════════════════
     NAS MODE
     ═══════════════════════════════════════════════════════ */
  var nasAudio       = null;   /* the <audio> element */
  var nasOrder       = [];     /* playback order (sequential or shuffled indices) */
  var nasOrderPos    = 0;      /* current position in nasOrder */

  if (NAS_MODE) {
    /* Hide YouTube-only elements, show NAS-only elements */
    document.getElementById('yt-player').style.display    = 'none';
    document.getElementById('nas-player').style.display   = 'block';
    document.getElementById('nas-prev').style.display     = 'inline-flex';
    document.getElementById('nas-playpause').style.display= 'inline-flex';
    document.getElementById('nas-next').style.display     = 'inline-flex';

    nasAudio = document.getElementById('nas-audio');

    /* Auto-advance to next track when current one ends */
    nasAudio.addEventListener('ended', function() { nasNext(); });

    /* Update elapsed time display while playing */
    nasAudio.addEventListener('timeupdate', function() {
      if (!nasAudio.duration) return;
      document.getElementById('yt-time-display').textContent =
        ytFmtTime(nasAudio.currentTime) + ' / ' + ytFmtTime(nasAudio.duration);
    });

    /* Update play/pause icon */
    nasAudio.addEventListener('play',  function() { nasSetIcon(true);  });
    nasAudio.addEventListener('pause', function() { nasSetIcon(false); });

    /* Load playlist from the NAS — supports both JSON and M3U/M3U8 formats.
       Detection is based on the file extension of the playlist URL. */
    if (NAS_PLAYLIST_URL) {
      document.getElementById('yt-playlist-loading').textContent = 'Loading playlist…';
      var isM3U = NAS_PLAYLIST_URL.toLowerCase().match(/\.m3u8?(\?|$)/);

      fetch(NAS_PLAYLIST_URL)
        .then(function(r) { return r.text(); })
        .then(function(text) {
          if (isM3U) {
            /* Parse extended M3U format (#EXTM3U / #EXTINF) */
            ytTracks = nasParseM3U(text, NAS_BASE_URL || nasBaseFromUrl(NAS_PLAYLIST_URL));
          } else {
            /* Parse JSON format { name, tracks: [...] } */
            var data = JSON.parse(text);
            if (data.name) document.getElementById('yt-playlist-name').textContent = data.name;
            ytTracks = data.tracks || [];
          }
          nasApplyShuffle();
          nasRenderPlaylist();
          nasUpdateCount();
          nasLoadTrack(0, false);
        })
        .catch(function(err) {
          document.getElementById('yt-playlist-loading').textContent = 'Error loading playlist.';
          console.error('NAS playlist load error:', err);
        });
    } else {
      document.getElementById('yt-playlist-loading').textContent = 'No playlist URL provided.';
    }
  }

  /* Extracts the folder URL from a playlist URL by stripping the filename.
     e.g. "https://nas/Music/Album/playlist.m3u" -> "https://nas/Music/Album/" */
  function nasBaseFromUrl(url) {
    return url.substring(0, url.lastIndexOf('/') + 1);
  }

  /* Parses an extended M3U file into the same track format used by JSON playlists.
     Handles both #EXTINF lines (title/artist/duration) and plain path lines.
     Relative paths are resolved against baseUrl (the folder containing the M3U file).
     Album art (folder.jpg) is loaded from baseUrl for all tracks in the file. */
  function nasParseM3U(text, baseUrl) {
    /* Ensure baseUrl ends with a slash */
    if (baseUrl && baseUrl.slice(-1) !== '/') baseUrl += '/';

    var lines   = text.split(/\r?\n/);
    var tracks  = [];
    var pending = { title: '', artist: '', duration: 0 };

    lines.forEach(function(line) {
      line = line.trim();
      if (!line || line === '#EXTM3U') return;

      if (line.startsWith('#EXTINF:')) {
        /* Format: #EXTINF:duration,Artist - Title */
        var comma = line.indexOf(',');
        if (comma !== -1) {
          pending.duration = parseInt(line.substring(8, comma)) || 0;
          var meta = line.substring(comma + 1).trim();
          var dash = meta.indexOf(' - ');
          if (dash !== -1) {
            pending.artist = meta.substring(0, dash).trim();
            pending.title  = meta.substring(dash + 3).trim();
          } else {
            pending.artist = '';
            pending.title  = meta;
          }
        }
      } else if (!line.startsWith('#')) {
        /* This is a file path line */
        var src = line;
        /* If it's a relative path (no protocol), prepend baseUrl */
        if (src && !src.match(/^https?:\/\//)) {
          src = baseUrl + src;
        }
        tracks.push({
          title:    pending.title  || src.split('/').pop(),
          artist:   pending.artist || '',
          src:      src,
          folder:   baseUrl,   /* all tracks share the same folder.jpg */
          duration: pending.duration
        });
        /* Reset pending metadata for next track */
        pending = { title: '', artist: '', duration: 0 };
      }
    });
    return tracks;
  }

  /* Builds nasOrder: sequential [0,1,2,...] or shuffled */
  function nasApplyShuffle() {
    nasOrder = ytTracks.map(function(_, i) { return i; });
    if (ytShuffleOn) {
      /* Fisher-Yates shuffle */
      for (var i = nasOrder.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var tmp = nasOrder[i]; nasOrder[i] = nasOrder[j]; nasOrder[j] = tmp;
      }
    }
    /* Try to keep current track at current position after reshuffle */
    var curTrackIdx = nasOrder[nasOrderPos] !== undefined ? nasOrder[nasOrderPos] : 0;
    nasOrderPos = nasOrder.indexOf(curTrackIdx);
    if (nasOrderPos === -1) nasOrderPos = 0;
  }

  /* Renders the playlist rows for NAS mode */
  function nasRenderPlaylist() {
    var list = document.getElementById('yt-playlist-list');
    list.innerHTML = '';
    ytTracks.forEach(function(track, i) {
      var row = document.createElement('div');
      row.className = 'yt-track-row' + (i === ytCurrentIndex ? ' active' : '');
      row.id = 'yt-row-' + i;
      row.onclick = (function(idx) {
        return function() {
          /* Find this track index in nasOrder; if not found, put it first */
          nasOrderPos = nasOrder.indexOf(idx);
          if (nasOrderPos === -1) { nasOrder.unshift(idx); nasOrderPos = 0; }
          nasLoadTrack(nasOrderPos, true);
        };
      })(i);
      row.innerHTML =
        '<span class="yt-track-num">' + (i + 1) + '</span>' +
        '<img class="yt-track-thumb" src="' + track.folder + 'folder.jpg" loading="lazy" alt="" ' +
             'onerror="this.style.visibility=\'hidden\'"/>' +
        '<div class="yt-track-meta">' +
          '<div class="yt-track-name" id="yt-name-' + i + '">' + (track.title || '') + '</div>' +
          '<div class="yt-track-ch"  id="yt-ch-'   + i + '">' + (track.artist || '') + '</div>' +
        '</div>' +
        '<span class="yt-track-duration" id="yt-dur-' + i + '"></span>';
      list.appendChild(row);
    });
    /* Pre-load durations by creating temporary audio elements */
    nasLoadDurations();
  }

  /* Loads a track by its position in nasOrder.
     autoPlay = true to start playing immediately. */
  function nasLoadTrack(orderPos, autoPlay) {
    nasOrderPos   = orderPos;
    var trackIdx  = nasOrder[orderPos];
    var track     = ytTracks[trackIdx];
    if (!track) return;

    ytCurrentIndex = trackIdx;

    /* Update album art */
    document.getElementById('nas-album-art').src = track.folder + 'folder.jpg';

    /* Load audio */
    nasAudio.src = track.src;
    nasAudio.load();
    if (autoPlay) nasAudio.play();

    /* Update title in controls bar */
    document.getElementById('yt-track-title').textContent =
      (track.artist ? track.artist + ' — ' : '') + (track.title || '');

    /* Highlight active row */
    ytHighlightActive();
  }

  /* Loads durations for all tracks.
     If the track already has a duration from M3U #EXTINF, use it directly.
     Otherwise probe the audio file metadata (used for JSON playlists). */
  function nasLoadDurations() {
    ytTracks.forEach(function(track, i) {
      if (track.duration && track.duration > 0) {
        /* M3U already provided the duration in seconds — use it directly */
        var el = document.getElementById('yt-dur-' + i);
        if (el) el.textContent = ytFmtTime(track.duration);
      } else {
        /* JSON mode: probe audio metadata to get duration */
        var a = new Audio();
        a.preload = 'metadata';
        a.src = track.src;
        a.addEventListener('loadedmetadata', (function(idx, audio) {
          return function() {
            var el = document.getElementById('yt-dur-' + idx);
            if (el) el.textContent = ytFmtTime(audio.duration);
            nasUpdateCount();
          };
        })(i, a));
      }
    });
    /* Update count now for M3U tracks (durations already known) */
    nasUpdateCount();
  }

  /* Updates the "N tracks · X hrs Y min" header */
  function nasUpdateCount() {
    var total = 0;
    ytTracks.forEach(function(_, i) {
      var el = document.getElementById('yt-dur-' + i);
      if (el && el.textContent) total += ytSecondsFromText(el.textContent);
    });
    var countText = ytTracks.length + ' tracks';
    if (total > 0) countText += ' · ' + ytFmtTotal(total);
    document.getElementById('yt-playlist-count').textContent = countText;
  }

  function nasPlayPause() {
    if (!nasAudio) return;
    nasAudio.paused ? nasAudio.play() : nasAudio.pause();
  }

  function nasPrev() {
    if (nasOrderPos > 0) {
      nasLoadTrack(nasOrderPos - 1, !nasAudio.paused);
    } else {
      /* Wrap to end */
      nasLoadTrack(nasOrder.length - 1, !nasAudio.paused);
    }
  }

  function nasNext() {
    if (nasOrderPos < nasOrder.length - 1) {
      nasLoadTrack(nasOrderPos + 1, true);
    } else {
      /* Wrap to start */
      nasLoadTrack(0, true);
    }
  }

  /* Switches the play/pause button icon between play ▶ and pause ⏸ */
  function nasSetIcon(playing) {
    var icon = document.getElementById('nas-pp-icon');
    if (!icon) return;
    icon.innerHTML = playing
      ? '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>'  /* pause */
      : '<polygon points="5 3 19 12 5 21 5 3"/>';  /* play */
  }

  /* ═══════════════════════════════════════════════════════
     YOUTUBE MODE
     ═══════════════════════════════════════════════════════ */
  var ytPlayer, ytReady = false;

  /* Show cover image if thumb param provided */
  if (!NAS_MODE && YT_THUMB && YT_LIST_ID) {
    document.getElementById('yt-cover-img').src = decodeURIComponent(YT_THUMB);
    document.getElementById('yt-cover-wrap').style.display = 'block';
  }

  window.onYouTubeIframeAPIReady = function () {
    if (NAS_MODE || !YT_LIST_ID) return;

    document.getElementById('yt-empty').style.display = 'none';
    document.getElementById('yt-playlist-loading').textContent = 'Loading tracks…';

    ytPlayer = new YT.Player('yt-player', {
      height: '100%',
      width: '100%',
      playerVars: {
        listType: 'playlist',
        list: YT_LIST_ID,
        autoplay: 0,
        playsinline: 1,
        rel: 0,
        modestbranding: 1,
        origin: 'https://dvolpino.github.io'
      },
      events: {
        onReady: function () {
          var iframe = document.querySelector('#yt-player iframe');
          if (iframe) iframe.setAttribute('referrerpolicy', 'strict-origin-when-cross-origin');
          ytReady = true;
          setTimeout(ytBuildPlaylist, 1500);
        },
        onStateChange: function (e) {
          if (e.data === YT.PlayerState.PLAYING) {
            document.getElementById('yt-cover-wrap').style.display = 'none';
            ytStartTimer();
          } else if (e.data === YT.PlayerState.ENDED || e.data === YT.PlayerState.PAUSED) {
            ytStopTimer();
          }
          ytUpdateTitle();
          if (e.data === YT.PlayerState.PLAYING || e.data === YT.PlayerState.PAUSED) {
            try {
              /* Match by video ID — stays correct even when shuffle reorders the queue.
                 If ID is not found we are in a transient between-tracks state — skip update. */
              var currentId = ytPlayer.getVideoData().video_id;
              var foundIndex = ytTracks.findIndex(function(t) { return t.id === currentId; });
              if (foundIndex !== -1) {
                ytCurrentIndex = foundIndex;
                ytHighlightActive();
              }
            } catch(err) {}
          }
        }
      }
    });
  };

  function ytBuildPlaylist() {
    try {
      var ids = ytPlayer.getPlaylist();
      if (!ids || ids.length === 0) { setTimeout(ytBuildPlaylist, 1000); return; }
      ytTracks = ids.map(function(id, i) { return { id: id, title: 'Track ' + (i+1), channel: '' }; });
      ytRenderPlaylist();
      /* Show track count immediately while durations load */
      document.getElementById('yt-playlist-count').textContent = ids.length + ' tracks';
      ytFetchTitles();
    } catch(e) { setTimeout(ytBuildPlaylist, 1000); }
  }

  function ytRenderPlaylist() {
    var list = document.getElementById('yt-playlist-list');
    list.innerHTML = '';
    ytTracks.forEach(function(track, i) {
      var row = document.createElement('div');
      row.className = 'yt-track-row' + (i === ytCurrentIndex ? ' active' : '');
      row.id = 'yt-row-' + i;
      row.onclick = (function(idx) { return function() { ytPlayer.playVideoAt(idx); }; })(i);
      row.innerHTML =
        '<span class="yt-track-num">' + (i+1) + '</span>' +
        '<img class="yt-track-thumb" src="https://img.youtube.com/vi/' + track.id + '/mqdefault.jpg" loading="lazy" alt=""/>' +
        '<div class="yt-track-meta">' +
          '<div class="yt-track-name" id="yt-name-' + i + '">' + track.title + '</div>' +
          '<div class="yt-track-ch"  id="yt-ch-'   + i + '">' + track.channel + '</div>' +
        '</div>' +
        '<span class="yt-track-duration" id="yt-dur-' + i + '"></span>';
      list.appendChild(row);
    });
  }

  var YT_API_KEY = 'AIzaSyAc24B5nbXmo_JribpDDxskj6huBH2vNhE';

  /* Accumulates total playlist duration in seconds across all batches */
  var ytTotalSeconds = 0;

  function ytFetchTitles() {
    var ids = ytTracks.map(function(t) { return t.id; });
    for (var i = 0; i < ids.length; i += 50) {
      ytFetchBatch(ids.slice(i, i + 50), i);
    }
  }

  function ytFetchBatch(batchIds, offset) {
    var url = 'https://www.googleapis.com/youtube/v3/videos'
      + '?part=snippet,contentDetails'
      + '&id=' + batchIds.join(',')
      + '&key=' + YT_API_KEY;

    fetch(url)
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (!data.items) return;
        data.items.forEach(function(item, j) {
          var idx = offset + j;
          var n = document.getElementById('yt-name-' + idx);
          var c = document.getElementById('yt-ch-' + idx);
          var d = document.getElementById('yt-dur-' + idx);
          if (n) n.textContent = item.snippet.title || '';
          if (c) c.textContent = (item.snippet.channelTitle || '').replace(/ - Topic$/, '').trim();
          if (d) d.textContent = ytParseDuration(item.contentDetails.duration);
        });
        /* Recount total after each batch lands */
        ytTotalSeconds = 0;
        ytTracks.forEach(function(t, i) {
          var d = document.getElementById('yt-dur-' + i);
          if (d && d.textContent) ytTotalSeconds += ytSecondsFromText(d.textContent);
        });
        document.getElementById('yt-playlist-count').textContent =
          ytTracks.length + ' tracks · ' + ytFmtTotal(ytTotalSeconds);
      })
      .catch(function() {});
  }

  function ytParseDuration(iso) {
    if (!iso) return '';
    var m = iso.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
    if (!m) return '';
    var h = parseInt(m[1] || 0), min = parseInt(m[2] || 0), sec = parseInt(m[3] || 0);
    if (h > 0) return h + ':' + ('0'+min).slice(-2) + ':' + ('0'+sec).slice(-2);
    return min + ':' + ('0'+sec).slice(-2);
  }

  /* ═══════════════════════════════════════════════════════
     SHARED UTILITIES
     ═══════════════════════════════════════════════════════ */

  /* Converts "m:ss" or "h:mm:ss" back to total seconds */
  function ytSecondsFromText(str) {
    var parts = str.split(':').map(Number);
    if (parts.length === 3) return parts[0] * 3600 + parts[1] * 60 + parts[2];
    if (parts.length === 2) return parts[0] * 60 + parts[1];
    return 0;
  }

  /* Formats seconds into "X hrs, Y min" or "Y min" */
  function ytFmtTotal(secs) {
    var h = Math.floor(secs / 3600), m = Math.floor((secs % 3600) / 60);
    if (h > 0) return h + ' hr' + (h > 1 ? 's' : '') + ', ' + m + ' min';
    return m + ' min';
  }

  /* Formats seconds into "h:mm:ss" or "m:ss" */
  function ytFmtTime(s) {
    s = Math.floor(s);
    var h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), sec = s % 60;
    if (h > 0) return h + ':' + ('0'+m).slice(-2) + ':' + ('0'+sec).slice(-2);
    return m + ':' + ('0'+sec).slice(-2);
  }

  /* Highlights the active row in the playlist and scrolls it into view */
  function ytHighlightActive() {
    document.querySelectorAll('.yt-track-row').forEach(function(el, i) {
      el.classList.toggle('active', i === ytCurrentIndex);
    });
    var active = document.getElementById('yt-row-' + ytCurrentIndex);
    if (active) active.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  /* YouTube mode: update title from player data */
  function ytUpdateTitle() {
    try {
      var d = ytPlayer.getVideoData();
      document.getElementById('yt-track-title').textContent = d.title || '';
    } catch(e) {}
  }

  /* YouTube mode: elapsed time timer */
  function ytStartTimer() {
    if (ytTimerInterval) clearInterval(ytTimerInterval);
    ytTimerInterval = setInterval(function() {
      if (!ytPlayer) return;
      try {
        var cur = ytPlayer.getCurrentTime(), dur = ytPlayer.getDuration();
        var el = document.getElementById('yt-time-display');
        if (el && dur > 0) el.textContent = ytFmtTime(cur) + ' / ' + ytFmtTime(dur);
      } catch(e) {}
    }, 500);
  }

  function ytStopTimer() {
    if (ytTimerInterval) { clearInterval(ytTimerInterval); ytTimerInterval = null; }
    var el = document.getElementById('yt-time-display');
    if (el) el.textContent = '';
  }

  function ytStartFromCover() {
    document.getElementById('yt-cover-wrap').style.display = 'none';
    if (ytPlayer) ytPlayer.playVideo();
  }
</script>
<script src="https://www.youtube.com/iframe_api"></script>
